{{ define "main" }}
<div class="post-header">
  <h1>{{ .Title }}</h1>
  <div class="post-meta">
    {{ .Date.Format "2006-01-02" }}
    {{ with .Params.tags }} &middot; {{ range $i, $t := . }}{{ if $i }}, {{ end }}{{ $t }}{{ end }}{{ end }}
  </div>
</div>

<main>
  <article class="post-body">
    {{ .Content }}
  </article>
</main>
{{ end }}
