site_name: India Symbol History & Corporate Actions Truth Layer
site_description: Versioned NSE symbol lineage and corporate action reference data for backtesting.
site_url: https://icashtl.pages.dev
docs_dir: landing-page
site_dir: ../site

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight

nav:
  - Home: index.md
  - Product Overview: product-overview.md
  - Methodology: methodology.md
  - Pricing: pricing.md
  - Sample Queries: sample-queries.md
  - Release Notes: release-notes.md

# Cloudflare Pages build:
#   build command: pip install mkdocs mkdocs-material && mkdocs build --config-file website/config.yaml
#   output directory: site
