name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install ruff

      - name: Check lint and formatting
        run: |
          ruff check .
          ruff format --check .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # playwright package installed but not browser binaries — unit tests mock subprocess calls
        run: |
          pip install -r requirements.txt
          pip install playwright

      - name: Run unit tests
        run: pytest tests/ -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: htmlcov/
          if-no-files-found: ignore

  hugo-build:
    name: Blog Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.164.0"
          extended: true

      - name: Build blog (validation only — Cloudflare Pages does the real build)
        run: hugo --source website/blog --destination /tmp/hugo-check --minify
