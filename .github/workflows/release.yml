name: Release

on:
  push:
    tags:
      - "v*"   # triggers on any tag like v2026.06.30

env:
  PYTHONPATH: .
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  R2_BUCKET: ${{ secrets.R2_BUCKET }}

jobs:
  build-and-publish:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write      # needed to push website changes back to main
      pull-requests: write # needed for the PR fallback when main is protected

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0   # full history required to push back to main
          # RELEASE_BOT_PAT (a PAT from a repo admin) lets this push bypass
          # main's required-review rule directly, since enforce_admins is
          # off. Falls back to the default token (which will need the PR
          # fallback below, requiring manual merge) if the secret isn't set.
          token: ${{ secrets.RELEASE_BOT_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Extract release date from tag
        id: tag
        # Tag format: v2026.06.30 → run_date: 2026-06-30
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          RUN_DATE=$(echo "$TAG" | sed 's/\./\-/g')
          echo "run_date=$RUN_DATE" >> "$GITHUB_OUTPUT"

      - name: Run export pipeline
        env:
          RUN_DATE: ${{ steps.tag.outputs.run_date }}
        run: |
          python pipelines/run.py \
            --date "$RUN_DATE" \
            --tasks export,manifest,release-notes,website \
            --no-fetch \
            --no-dolt-commit

      - name: Commit website and release notes back to main
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="release-bot/website-${TAG}"
          git checkout -b "${BRANCH}" origin/main
          git add website/landing-page/release-notes.html \
                  releases/monthly/${TAG}.md

          # Nothing staged means the card was already injected on a prior run
          if git diff --cached --quiet; then
            echo "No changes — already up to date"
            exit 0
          fi

          git commit -m "release(${TAG}): update release notes and website"

          # Try a direct push to main (works when branch protection is off).
          # If protection is enabled, fall back to opening a PR instead.
          if git push origin "${BRANCH}:main"; then
            echo "Pushed directly to main"
          else
            echo "Direct push blocked — opening PR"
            git push origin "${BRANCH}"
            gh pr create \
              --title "release(${TAG}): update release notes and website" \
              --body "Automated: injects the ${TAG} release card into \`release-notes.html\`." \
              --base main \
              --head "${BRANCH}"
          fi

      - name: Generate GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body_path: releases/monthly/${{ github.ref_name }}.md
          fail_on_unmatched_files: false
          files: |
            data/samples/public/*.csv
            data/samples/public/*.sha256
            data/samples/metadata/manifest_*.md

      - name: Upload paid-tier artifacts to R2
        if: env.R2_BUCKET != ''
        env:
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RUN_DATE:             ${{ steps.tag.outputs.run_date }}
        run: |
          python - <<'EOF'
          import boto3, os
          from botocore.config import Config
          from pathlib import Path

          s3 = boto3.client(
              "s3",
              endpoint_url=os.environ["R2_ENDPOINT"],
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              config=Config(
                  request_checksum_calculation="when_required",
                  response_checksum_validation="when_required",
              ),
          )
          bucket   = os.environ["R2_BUCKET"]
          run_date = os.environ["RUN_DATE"]

          for tier in ["paid_tier_1", "paid_tier_2"]:
              for path in Path(f"data/samples/{tier}").glob("*"):
                  key = f"releases/{run_date}/{tier}/{path.name}"
                  s3.upload_file(str(path), bucket, key)
                  print(f"Uploaded {key}")
          EOF
