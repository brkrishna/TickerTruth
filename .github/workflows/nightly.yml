name: Nightly Data Refresh

on:
  schedule:
    # 2:00 AM IST = 20:30 UTC previous day (Mon–Fri trading days)
    - cron: "30 20 * * 1-5"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      run_date:
        description: "Override run date (YYYY-MM-DD). Defaults to today."
        required: false
        type: string
      dry_run:
        description: "Dry run — skip Dolt commit"
        required: false
        type: boolean
        default: false

env:
  PYTHONPATH: .
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Nightly only keeps the underlying reference data current in Dolt
# (extract -> ... -> load) on trading days, so corporate-action/lineage
# issues surface as small daily diffs instead of piling up. The public
# release — website update, R2 sample publish — happens once a month via
# release.yml, triggered by a version tag, since that's the actual cadence
# customers receive.
jobs:
  refresh:
    name: Data Refresh Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Install Dolt
        run: |
          curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | sudo bash
          dolt version

      - name: Configure Dolt identity
        run: |
          dolt config --global --add user.name  "TickerTruth Bot"
          dolt config --global --add user.email "bot@tickertruth.com"

      - name: Initialize Dolt repository
        run: |
          cd dolt
          dolt init
          dolt sql < schema.sql
          dolt add -A
          dolt commit -m "init schema"

      - name: Run pipeline (data refresh only — no publish)
        env:
          RUN_DATE:  ${{ github.event.inputs.run_date }}
          DRY_RUN:   ${{ github.event.inputs.dry_run }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python pipelines/run.py \
            --tasks extract,normalize,lineage,adjust,validate,load \
            ${RUN_DATE:+--date $RUN_DATE} \
            $([[ "$DRY_RUN" == "true" ]] && echo "--dry-run")

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: quality-report-${{ github.run_id }}
          path: data/staging/quality_report_*.json
          if-no-files-found: ignore
