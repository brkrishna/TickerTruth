name: Nightly Data Refresh

on:
  schedule:
    # 2:00 AM IST = 20:30 UTC previous day (Mon–Fri trading days)
    - cron: "30 20 * * 1-5"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      run_date:
        description: "Override run date (YYYY-MM-DD). Defaults to today."
        required: false
        type: string
      dry_run:
        description: "Dry run — skip Dolt commit and R2 upload"
        required: false
        type: boolean
        default: false

env:
  PYTHONPATH: .
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  R2_BUCKET: ${{ secrets.R2_BUCKET }}

jobs:
  refresh:
    name: Data Refresh Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Install Dolt
        run: |
          curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | sudo bash
          dolt version

      - name: Configure Dolt identity
        run: |
          dolt config --global --add user.name  "TickerTruth Bot"
          dolt config --global --add user.email "bot@tickertruth.com"

      - name: Initialize Dolt repository
        run: |
          cd dolt
          dolt init
          dolt sql < schema.sql
          dolt add -A
          dolt commit -m "init schema"

      - name: Run pipeline
        env:
          RUN_DATE:  ${{ github.event.inputs.run_date }}
          DRY_RUN:   ${{ github.event.inputs.dry_run }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python pipelines/run.py \
            ${RUN_DATE:+--date $RUN_DATE} \
            $([[ "$DRY_RUN" == "true" ]] && echo "--dry-run")

      - name: Upload samples to R2
        if: success() && env.R2_BUCKET != '' && github.event.inputs.dry_run != 'true'
        env:
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RUN_DATE:             ${{ github.event.inputs.run_date }}
        run: |
          python - <<'EOF'
          import boto3, os
          from botocore.config import Config
          from datetime import date
          from pathlib import Path

          run_date = os.environ.get("RUN_DATE") or str(date.today())

          s3 = boto3.client(
              "s3",
              endpoint_url=os.environ["R2_ENDPOINT"],
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              config=Config(
                  request_checksum_calculation="when_required",
                  response_checksum_validation="when_required",
              ),
          )
          bucket = os.environ["R2_BUCKET"]

          tiers = ["public", "paid_tier_1", "paid_tier_2"]
          uploaded = 0
          for tier in tiers:
              tier_dir = Path(f"data/samples/{tier}")
              if not tier_dir.exists():
                  print(f"  skip {tier}: directory not found")
                  continue
              for path in sorted(tier_dir.glob("*")):
                  key = f"releases/{run_date}/{tier}/{path.name}"
                  s3.upload_file(str(path), bucket, key)
                  print(f"  uploaded {key}")
                  uploaded += 1
          print(f"Done — {uploaded} files uploaded to R2")
          EOF

      - name: Commit updated release-notes.html
        if: success() && github.event.inputs.dry_run != 'true'
        env:
          RUN_DATE: ${{ github.event.inputs.run_date }}
        run: |
          git config user.name  "TickerTruth Bot"
          git config user.email "bot@tickertruth.com"
          if ! git diff --quiet website/landing-page/release-notes.html; then
            git add website/landing-page/release-notes.html
            git commit -m "chore(website): update release notes for ${RUN_DATE:-$(date +%Y-%m-%d)} [skip actions]"
            git pull --rebase origin main
            git push origin HEAD:main
            echo "release-notes.html pushed — Cloudflare Pages will redeploy"
          else
            echo "release-notes.html unchanged — no commit needed"
          fi

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: quality-report-${{ github.run_id }}
          path: data/staging/quality_report_*.json
          if-no-files-found: ignore

      - name: Upload release manifest
        if: success()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: manifest-${{ github.run_id }}
          path: data/samples/metadata/manifest_*.md
          if-no-files-found: ignore
