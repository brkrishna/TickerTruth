name = "tickertruth"
pages_build_output_dir = "website/landing-page"

# Contact form email delivery uses Resend (https://resend.com).
# Set RESEND_API_KEY as an environment variable in the Pages dashboard:
#   Pages > tickertruth > Settings > Environment variables > Add variable
#   Variable name: RESEND_API_KEY   Value: re_xxxxxxxxxxxx
# The sending domain (tickertruth.com) must be verified in your Resend account.
